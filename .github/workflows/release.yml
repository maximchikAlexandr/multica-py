name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --all-groups
      - run: uv build
      - run: python -m venv /tmp/verify-venv && /tmp/verify-venv/bin/pip install dist/*.whl && /tmp/verify-venv/bin/python -c "import multica_py; from multica_py import ClientConfig, MulticaClient; MulticaClient(ClientConfig()); print('import OK')"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
