target-version = "py312"
line-length = 100
exclude = [
    "mutants",
    ".venv",
    "build",
    "dist",
]

[lint]
select = [
    "BLE", "C", "E", "F", "FA", "FLY", "G", "I", "ICN", "ISC",
    "LOG", "PGH", "PIE", "PLC", "PLE", "PLW", "PYI", "RET", "RUF",
    "SIM", "SLOT", "T", "TC", "TID", "TRY", "UP", "W", "YTT",
]
ignore = [
    "COM812",
    "E501",
    "EM101",
    "EM102",
    "TC001",
    "TC003",
    "BLE001",
    "TRY003",
    "T201",
    "PYI034",
    "UP046",
    "UP047",
    "PLC0415",  # local imports in test bodies are common
    "C901",  # complexity budget overridden per-function when needed
    "RET504",  # unnecessary assignment before return is fine for readability
    "TRY004",  # ValueError acceptable in domain boundaries
    "RUF034",  # explicit if/else clearer when both branches are the same
    "SIM102",  # nested if acceptable
    "RUF005",  # tuple concatenation is readable
    "FLY002",  # string join is clearer in fixture files
    # msgspec-specific noise
]

[lint.per-file-ignores]
"tests/**" = ["F401", "PLC0415", "B008"]
"scripts/**" = ["E402", "PLC0415", "B008"]
"src/**" = ["TID252"]
"src/multica_py/_internal/compat.py" = ["PLW0603"]

[lint.isort]
known-first-party = ["multica_py"]

[format]
docstring-code-format = true
